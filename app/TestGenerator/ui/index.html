<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestGenerator</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#388bfd" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <h1>TestGenerator</h1>
      </div>
      <span class="badge">QA Pipeline</span>
    </div>
    <div class="header-controls">
      <div class="input-group">
        <label for="ticket-input">Ticket</label>
        <input type="text" id="ticket-input" placeholder="SM-XXXX" spellcheck="false" autocomplete="off">
      </div>
      <div class="input-group">
        <label for="filter-select">Filter</label>
        <select id="filter-select">
          <option value="all">All Eligible</option>
          <option value="me" selected>My Tickets</option>
        </select>
      </div>
      <div class="input-group range-group">
        <label>Steps</label>
        <div class="range-inputs">
          <input type="number" id="step-start" min="1" max="11" value="1">
          <span class="range-sep">to</span>
          <input type="number" id="step-end" min="1" max="11" value="11">
        </div>
      </div>
      <button id="run-btn" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Run
      </button>
    </div>
  </header>

  <main>
    <!-- Ticket Info Bar -->
    <section id="ticket-bar" class="ticket-bar hidden">
      <div class="ticket-info">
        <span class="ticket-key" id="ticket-key-display"></span>
        <span class="ticket-summary" id="ticket-summary-display"></span>
      </div>
      <div class="ticket-meta">
        <span class="ticket-status-badge" id="ticket-status-display"></span>
        <span class="ticket-assignee" id="ticket-assignee-display"></span>
      </div>
    </section>

    <!-- Pipeline Grid -->
    <section id="pipeline-grid" class="pipeline-grid"></section>

    <!-- Bottom Panel -->
    <section class="bottom-panel">
      <div class="panel-header">
        <div class="panel-tabs">
          <button class="tab active" data-tab="logs">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Live Logs
          </button>
          <button class="tab" data-tab="step-logs">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            Step Logs
          </button>
          <button class="tab" data-tab="history">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Run History
          </button>
        </div>
        <button class="btn-clear" id="clear-logs-btn" title="Clear logs">Clear</button>
      </div>
      <div id="tab-logs" class="tab-content active">
        <div id="log-output" class="log-output"></div>
      </div>
      <div id="tab-step-logs" class="tab-content">
        <div id="step-logs-header" class="step-logs-header"></div>
        <div id="step-logs-output" class="log-output"></div>
      </div>
      <div id="tab-history" class="tab-content">
        <div id="history-list" class="history-list"></div>
        <div id="run-detail" class="run-detail hidden"></div>
      </div>
    </section>
  </main>

  <!-- Schedule Modal -->
  <div id="schedule-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Schedule Step</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>

      <div class="modal-body">
        <!-- Frequency Selector -->
        <div class="sched-form">
          <div class="sched-field">
            <label>Frequency</label>
            <div class="freq-pills" id="freq-pills">
              <button class="freq-pill" data-freq="1">1h</button>
              <button class="freq-pill" data-freq="2">2h</button>
              <button class="freq-pill" data-freq="4">4h</button>
              <button class="freq-pill" data-freq="6">6h</button>
              <button class="freq-pill" data-freq="8">8h</button>
              <button class="freq-pill" data-freq="12">12h</button>
              <button class="freq-pill active" data-freq="24">Daily</button>
            </div>
          </div>

          <!-- Time Preview -->
          <div class="cron-preview">
            <span class="cron-label" id="cron-label">Daily at</span>
            <div class="cron-boxes">
              <span class="cron-box" id="cron-hh">22</span>
              <span class="cron-colon">:</span>
              <span class="cron-box" id="cron-mm">00</span>
            </div>
            <span class="cron-desc" id="cron-desc">every day at 10:00 PM</span>
          </div>

          <!-- Time inputs -->
          <div class="sched-row" id="time-row">
            <div class="sched-field" id="hour-field">
              <label>Hour (0-23)</label>
              <input type="number" id="sched-hour" min="0" max="23" value="22">
            </div>
            <div class="sched-field">
              <label>Minute (0-59)</label>
              <input type="number" id="sched-minute" min="0" max="59" value="0">
            </div>
          </div>

          <div class="sched-row">
            <div class="sched-field">
              <label>Schedule Name</label>
              <input type="text" id="sched-name" placeholder="Nightly QA Run" spellcheck="false">
            </div>
          </div>
          <div class="sched-row">
            <div class="sched-field">
              <label>Filter</label>
              <select id="sched-filter">
                <option value="all">All Eligible</option>
                <option value="me">My Tickets</option>
              </select>
            </div>
            <div class="sched-field">
              <label>Ticket (optional)</label>
              <input type="text" id="sched-ticket" placeholder="SM-XXXX" spellcheck="false" style="text-transform:uppercase">
            </div>
          </div>
          <button id="sched-save-btn" class="btn-primary" style="width:100%;justify-content:center;margin-top:8px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Set Schedule
          </button>
        </div>

        <!-- Existing Schedules -->
        <div class="sched-divider"></div>
        <div class="sched-list-header">Active Schedules</div>
        <div id="sched-list" class="sched-list"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
