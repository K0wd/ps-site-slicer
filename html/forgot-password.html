<!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml"><head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">        <title>
            Betacom Site Manager        </title>
        <link href="/main/favicon.ico" type="image/x-icon" rel="icon"><link href="/main/favicon.ico" type="image/x-icon" rel="shortcut icon">	
        <!-- CSS -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,100,300,500">
            <link rel="stylesheet" type="text/css" href="/main/css/alt/slate.bootstrap.min.css">            <link rel="stylesheet" type="text/css" href="/main/css/login-font-css/font-awesome.min.css">            <link rel="stylesheet" type="text/css" href="/main/css/form-elements.css">            <link rel="stylesheet" type="text/css" href="/main/css/login.css">
            <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
            <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
            <!--[if lt IE 9]>
                <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
                <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
            <![endif]-->

            <!-- Javascript -->
            <script type="text/javascript" src="/main/js/alt/jquery-1.11.0.min.js"></script>            <script type="text/javascript" src="/main/js/alt/bootstrap.min.js"></script>            <script type="text/javascript" src="/main/js/login/jquery.backstretch.min.js"></script>            <script type="text/javascript" src="/main/js/login/scripts.js"></script>    </head>
    <body>
        <div id="container" class="centerpublic">            
            <div id="login">
                <!-- Top content -->
<div class="top-content">
    <div class="inner-bg">
        <div class="container">
            <div class="row">                
                <div id="header" class="centerpublic col-sm-8 col-sm-offset-2 text">
                    <div id="logo">
                        <img height="100" src="/main/downloads/logoimage">
                    </div>
                    <h1>
                        <strong>Site Manager</strong>
                                                    (Test account)
                                            </h1>

                </div>
            </div>
            <div class="row">
                <span id="sessionMessage">
                                    </span>

                <div class="col-sm-6 col-sm-offset-3 form-box users form">
                    <div class="form-top">
                        <div class="form-top-left">
                            <h3>Password Reset</h3>
                            <p>
                                Please provide the following information so that we can find your account and send you a temporary link to access your account.
                            </p>
                        </div>
                        <div class="form-top-right">
                            <i class="fa fa-question"></i>
                        </div>
                    </div>
                    <div class="form-bottom">
                        <form action="/main/users/forgot" class="login-form" id="UserForgotForm" method="post" accept-charset="utf-8"><div style="display:none;"><input type="hidden" name="_method" value="POST" style=""></div>                        <div class="form-group required"><label for="form-username" class="sr-only">Username</label><input name="data[User][username]" type="text" class="form-username form-control require-field" id="form-username" placeholder="Username..." autofocus="1" maxlength="50" style=""></div>                        <div class="form-group required"><label for="UserEmail" class="sr-only">Email</label><input name="data[User][email]" type="text" class="form-email form-control require-field" id="UserEmail" placeholder="Email..." maxlength="50" style=""></div>                        <button type="submit" class="btn">Send Access Link</button>                        
                    </form></div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6 col-sm-offset-3 social-login">
                    <!--<h3>...or login with:</h3>-->
                    <div class="social-login-buttons">
                        <a class="btn btn-link-2" href="https://testserver.betacom.com/main/users/login">
                            <i class="fa fa-question"></i> Login
                        </a>
                    </div>
                    <div class="centerpublic bottom_centerpublic">
                        Betacom Site Manager Version 10.9185                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    $(document).ready(function () {
        var forgotMessage = '0';
        if (forgotMessage == 1) {
            setTimeout(function () {
                 window.location = '/main/users/login/';
            }, 5000);
        }
    });
</script>            </div>
        </div>
            
</body></html>
